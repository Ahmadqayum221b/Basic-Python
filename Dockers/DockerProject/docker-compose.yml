services:
  db:
    image: mysql:latest
    container_name: mysql_database
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web_app:
    build: .
    container_name: python_app
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  db_data: